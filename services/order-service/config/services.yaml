services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\EventPublisherService:
        arguments:
            $rabbitmqUrl: '%env(RABBITMQ_URL)%'

    App\Service\EventConsumerService:
        arguments:
            $rabbitmqUrl: '%env(RABBITMQ_URL)%'